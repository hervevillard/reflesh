services:
  artsegment:
    build: .
    runtime: nvidia
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
      # HuggingFace auth token — required to download SAM3 weights.
      # Get yours at https://huggingface.co/settings/tokens
      # then: export HF_TOKEN=hf_xxx  before running docker compose up
      - HF_TOKEN=${HF_TOKEN}
      - HUGGINGFACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      # X11 display forwarding (Linux / WSL2 with WSLg)
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:rw
      # Persist HuggingFace model cache so SAM3 weights survive container restarts
      - hf_cache:/root/.cache/huggingface
      # Export output images to host
      - ./output:/app/output
    network_mode: host

volumes:
  hf_cache:
